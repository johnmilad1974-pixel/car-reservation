<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Reservation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --accent-light: #ff6b88;
            --success: #00d9a5;
            --warning: #ffa600;
            --bg: #0f0f1e;
            --surface: #1e1e2f;
            --text: #e8e8e8;
            --text-dim: #a0a0b0;
            --border: #2a2a3e;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1a2e 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 217, 165, 0.06) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 50%, var(--success) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            animation: fadeIn 1s ease-out 0.2s backwards;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(233, 69, 96, 0.2);
        }

        .card-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(to bottom, var(--accent), var(--accent-light));
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
        }

        input::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%23a0a0b0' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 3rem;
        }

        .license-plate-display {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 1.5rem;
            font-family: 'Unbounded', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: white;
            box-shadow: 0 4px 16px rgba(233, 69, 96, 0.3);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .license-plate-display.empty {
            background: var(--primary);
            color: var(--text-dim);
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
        }

        button {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 16px rgba(233, 69, 96, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(233, 69, 96, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .reservations-list {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .reservations-list::-webkit-scrollbar {
            width: 8px;
        }

        .reservations-list::-webkit-scrollbar-track {
            background: var(--primary);
            border-radius: 4px;
        }

        .reservations-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .reservation-item {
            background: var(--primary);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent);
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .reservation-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .reservation-item.confirmed {
            border-left-color: var(--success);
        }

        .reservation-item.not-confirmed {
            border-left-color: var(--warning);
        }

        .reservation-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.75rem;
        }

        .requester {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text);
        }

        .status {
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .status.confirmed {
            background: rgba(0, 217, 165, 0.15);
            color: var(--success);
        }

        .status.not-confirmed {
            background: rgba(255, 166, 0, 0.15);
            color: var(--warning);
        }

        .reservation-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .detail-item {
            color: var(--text-dim);
        }

        .detail-item strong {
            color: var(--text);
            display: block;
            margin-bottom: 0.25rem;
        }

        .car-model {
            font-size: 1rem;
            color: var(--accent-light);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .license-plate {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            color: var(--text);
            font-size: 1.1rem;
            letter-spacing: 0.1em;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            padding: 1.25rem 1.75rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
            max-width: 400px;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--accent);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Vehicle Reservation System</h1>
            <p class="subtitle">Book your company vehicle with automatic conflict detection</p>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2 class="card-title">New Reservation</h2>
                
                <form id="reservationForm">
                    <div class="form-group">
                        <label for="requester">Requester Name</label>
                        <input type="text" id="requester" required placeholder="Enter your name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="your.email@company.com">
                    </div>

                    <div class="form-group">
                        <label for="dayOfRequest">Day of Request</label>
                        <input type="date" id="dayOfRequest" required>
                    </div>

                    <div class="form-group">
                        <label for="dateOfUse">Date of Use</label>
                        <input type="date" id="dateOfUse" required>
                    </div>

                    <div class="form-group">
                        <label for="dateOfReturn">Date of Return</label>
                        <input type="date" id="dateOfReturn" required>
                    </div>

                    <div class="form-group">
                        <label for="carModel">Car Model</label>
                        <select id="carModel" required>
                            <option value="">Select a vehicle</option>
                            <option value="Toyota Corolla Hatchback (KWHS)">Toyota Corolla Hatchback (KWHS)</option>
                            <option value="Toyota Corolla Hatchback (CSK8)">Toyota Corolla Hatchback (CSK8)</option>
                            <option value="Toyota Corolla Sedan Hybrid (BGRK8)">Toyota Corolla Sedan Hybrid (BGRK8)</option>
                            <option value="Hyundai Venue SUV (WML)">Hyundai Venue SUV (WML)</option>
                        </select>
                    </div>

                    <div class="license-plate-display empty" id="licensePlateDisplay">
                        License plate will appear here
                    </div>

                    <button type="submit">Submit Reservation</button>
                </form>
            </div>

            <div class="card">
                <h2 class="card-title">Active Reservations</h2>
                <div class="reservations-list" id="reservationsList">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 17h14M5 17a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2M5 17v4m14-4v4"></path>
                            <circle cx="12" cy="9" r="2"></circle>
                            <path d="M9 9h-.01M15 9h-.01"></path>
                        </svg>
                        <p>No reservations yet. Submit your first booking!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Car model to license plate mapping
        const licensePlates = {
            "Toyota Corolla Hatchback (KWHS)": "156-3579",
            "Toyota Corolla Hatchback (CSK8)": "156-3575",
            "Toyota Corolla Sedan Hybrid (BGRK8)": "138-5249",
            "Hyundai Venue SUV (WML)": "NTX-2025"
        };

        // Store reservations (in real app, this would be a database)
        let reservations = [];

        // Update license plate display when car model changes
        document.getElementById('carModel').addEventListener('change', function() {
            const display = document.getElementById('licensePlateDisplay');
            const selectedCar = this.value;
            
            if (selectedCar && licensePlates[selectedCar]) {
                display.textContent = licensePlates[selectedCar];
                display.classList.remove('empty');
            } else {
                display.textContent = 'License plate will appear here';
                display.classList.add('empty');
            }
        });

        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dayOfRequest').value = today;
        document.getElementById('dayOfRequest').min = today;
        document.getElementById('dateOfUse').min = today;
        document.getElementById('dateOfReturn').min = today;

        // Update return date minimum when use date changes
        document.getElementById('dateOfUse').addEventListener('change', function() {
            document.getElementById('dateOfReturn').min = this.value;
        });

        // Check for date conflicts
        function checkConflict(carModel, dateOfUse, dateOfReturn, dayOfRequest) {
            const useDate = new Date(dateOfUse);
            const returnDate = new Date(dateOfReturn);
            const requestDate = new Date(dayOfRequest);

            // Find all reservations for the same car
            const sameCarReservations = reservations.filter(r => r.carModel === carModel);

            // Check for overlapping dates
            for (let reservation of sameCarReservations) {
                const existingUse = new Date(reservation.dateOfUse);
                const existingReturn = new Date(reservation.dateOfReturn);
                const existingRequest = new Date(reservation.dayOfRequest);

                // Check if dates overlap
                const hasOverlap = useDate <= existingReturn && returnDate >= existingUse;

                if (hasOverlap) {
                    // If there's overlap, check who requested first
                    if (requestDate > existingRequest) {
                        return { conflict: true, earlierReservation: reservation };
                    }
                }
            }

            return { conflict: false };
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠';
            toast.innerHTML = `
                <span style="font-size: 1.5rem;">${icon}</span>
                <span>${message}</span>
            `;
            
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Simulate sending email confirmation
        function sendEmailConfirmation(reservation) {
            // In a real application, this would make an API call to send an actual email
            console.log('Email confirmation sent to:', reservation.email);
            console.log('Reservation details:', reservation);
            
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve(true);
                }, 500);
            });
        }

        // Render reservations list
        function renderReservations() {
            const container = document.getElementById('reservationsList');
            
            if (reservations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 17h14M5 17a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2M5 17v4m14-4v4"></path>
                            <circle cx="12" cy="9" r="2"></circle>
                            <path d="M9 9h-.01M15 9h-.01"></path>
                        </svg>
                        <p>No reservations yet. Submit your first booking!</p>
                    </div>
                `;
                return;
            }

            // Sort by request date (earliest first)
            const sorted = [...reservations].sort((a, b) => 
                new Date(a.dayOfRequest) - new Date(b.dayOfRequest)
            );

            container.innerHTML = sorted.map(reservation => `
                <div class="reservation-item ${reservation.status === 'confirmed' ? 'confirmed' : 'not-confirmed'}">
                    <div class="reservation-header">
                        <div>
                            <div class="requester">${reservation.requester}</div>
                            <div class="car-model">${reservation.carModel}</div>
                        </div>
                        <div class="status ${reservation.status === 'confirmed' ? 'confirmed' : 'not-confirmed'}">
                            ${reservation.status === 'confirmed' ? '✓' : '⚠'} 
                            ${reservation.status === 'confirmed' ? 'Confirmed' : 'Not Confirmed'}
                        </div>
                    </div>
                    <div class="license-plate">License: ${reservation.licensePlate}</div>
                    <div class="reservation-details">
                        <div class="detail-item">
                            <strong>Requested</strong>
                            ${new Date(reservation.dayOfRequest).toLocaleDateString()}
                        </div>
                        <div class="detail-item">
                            <strong>Email</strong>
                            ${reservation.email}
                        </div>
                        <div class="detail-item">
                            <strong>Use Date</strong>
                            ${new Date(reservation.dateOfUse).toLocaleDateString()}
                        </div>
                        <div class="detail-item">
                            <strong>Return Date</strong>
                            ${new Date(reservation.dateOfReturn).toLocaleDateString()}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Handle form submission
        document.getElementById('reservationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                requester: document.getElementById('requester').value,
                email: document.getElementById('email').value,
                dayOfRequest: document.getElementById('dayOfRequest').value,
                dateOfUse: document.getElementById('dateOfUse').value,
                dateOfReturn: document.getElementById('dateOfReturn').value,
                carModel: document.getElementById('carModel').value,
                licensePlate: licensePlates[document.getElementById('carModel').value]
            };

            // Validate dates
            if (new Date(formData.dateOfReturn) < new Date(formData.dateOfUse)) {
                showToast('Return date must be after use date', 'error');
                return;
            }

            // Check for conflicts
            const conflictCheck = checkConflict(
                formData.carModel,
                formData.dateOfUse,
                formData.dateOfReturn,
                formData.dayOfRequest
            );

            let status = 'confirmed';
            let message = 'Reservation confirmed successfully! Email confirmation sent.';
            let toastType = 'success';

            if (conflictCheck.conflict) {
                status = 'not-confirmed';
                message = `⚠ Date conflict detected! ${conflictCheck.earlierReservation.requester} requested this vehicle first for overlapping dates. Your reservation is marked as NOT CONFIRMED.`;
                toastType = 'warning';
            }

            formData.status = status;
            reservations.push(formData);

            // Send email confirmation
            await sendEmailConfirmation(formData);

            // Show notification
            showToast(message, toastType);

            // Render updated list
            renderReservations();

            // Reset form
            this.reset();
            document.getElementById('dayOfRequest').value = today;
            document.getElementById('licensePlateDisplay').textContent = 'License plate will appear here';
            document.getElementById('licensePlateDisplay').classList.add('empty');
        });

        // Initial render
        renderReservations();
    </script>
</body>
</html>
